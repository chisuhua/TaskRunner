# .github/workflows/shim.yml
# Workstream B.2: CI/Build Infrastructure for TaskRunner shim layer
#
# Jobs:
#   1. build-and-test   — UMD-evolution mode, all test binaries via ctest
#   2. docs-audit       — Run docs-audit.sh to validate H-5 3-scope structure
#   3. sanitizer        — Matrix: ASan / UBSan / TSan (mutually exclusive, each single)
#
# Author: TaskRunner owner (Sisyphus-H5 session)
# Created: 2026-07-03
# Updated: 2026-07-07 — Fix CI symlink (UsrLinuxEmu: dangling symlink → fresh checkout)
#
# CI symlink fix: TaskRunner root has a tracked `UsrLinuxEmu` symlink (mode 120000
# blob) pointing to /workspace/project/UsrLinuxEmu — only valid on dev workstation.
# CI runner has no /workspace/project/UsrLinuxEmu, so the symlink is dangling and
# `#include "UsrLinuxEmu/plugins/gpu_driver/shared/gpu_ioctl.h"` fails to resolve.
# Fix: After the initial checkout (which creates the dangling symlink), remove it
# and re-checkout the UsrLinuxEmu 仓 into the same path so include resolution works.

name: TaskRunner-Shim-CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup UsrLinuxEmu symlink target (CI fix)
        run: rm -f UsrLinuxEmu

      - uses: actions/checkout@v4
        with:
          repository: chisuhua/UsrLinuxEmu
          ref: main
          path: UsrLinuxEmu

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake g++

      - run: cmake -B "$BUILD_DIR" -DTASKRUNNER_BUILD_MODE=umd-evolution

      - run: cmake --build "$BUILD_DIR" -j$(nproc)

      - run: cd "$BUILD_DIR" && ctest --output-on-failure -j$(nproc)

  docs-audit:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup UsrLinuxEmu symlink target (CI fix)
        run: rm -f UsrLinuxEmu

      - uses: actions/checkout@v4
        with:
          repository: chisuhua/UsrLinuxEmu
          ref: main
          path: UsrLinuxEmu

      - run: bash tools/docs-audit.sh

  sanitizer:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    strategy:
      fail-fast: false
      matrix:
        san:
          - name: ASan
            flag: -DSANITIZER_ADDRESS=ON
          - name: UBSan
            flag: -DSANITIZER_UNDEFINED=ON
          - name: TSan
            flag: -DSANITIZER_THREAD=ON
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup UsrLinuxEmu symlink target (CI fix)
        run: rm -f UsrLinuxEmu

      - uses: actions/checkout@v4
        with:
          repository: chisuhua/UsrLinuxEmu
          ref: main
          path: UsrLinuxEmu

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake g++

      - run: |
          cmake -B "$BUILD_DIR" \
            -DTASKRUNNER_BUILD_MODE=umd-evolution \
            ${{ matrix.san.flag }}

      - run: cmake --build "$BUILD_DIR" -j$(nproc)

      - run: cd "$BUILD_DIR" && ctest --output-on-failure -j$(nproc)