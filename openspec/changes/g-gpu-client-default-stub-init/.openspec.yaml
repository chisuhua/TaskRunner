schema: spec-driven
created: 2026-07-09
name: g-gpu-client-default-stub-init
status: PROPOSED
scope: [test-fixture, umd-evolution]
goal: Default-initialize g_gpu_client to &g_cuda_stub so UMD shim functions work without explicit test setup. Prerequisite entry 2/5 for UMD-EVOLUTION → ACCEPTED.
follows: src/test_fixture/cuda_stub.cpp static g_cuda_stub instance (already exists)
blocks:
  - l1-l2-bridge-e2e-test-skeleton
  - umd-evolution-acceptance-promotion-adr
baseline:
  g_gpu_client default value: nullptr
  shim behavior with null: cuStreamSynchronize returns NOT_INITIALIZED (recently fixed in test-cu-graph-coverage-fixes 4d266a8)
  test setup: every test must do g_gpu_client = &g_mock or &g_cuda_stub
target:
  g_gpu_client default value: &g_cuda_stub
  shim behavior with default: cuStreamSynchronize calls CudaStub::wait_fence which returns success immediately
  test setup: most tests don't need explicit set; only mock-based tests override
non_goals:
  - Removing the null check in shim (kept as belt-and-suspenders for test-fixture edge cases)
  - Changing CudaStub's wait_fence semantics
  - Auto-initializing in production builds (this is for tests only)
risk_level: low
cross_repo:
  - None (TaskRunner-only)
  - No UsrLinuxEmu submodule bump required
estimated_loc_change: ~5-10 lines in include/test_fixture/gpu_driver_client.h
acceptance:
  - New shim consumer test (no explicit g_gpu_client = ...) compiles and runs
  - cuStreamSynchronize called on default-init g_gpu_client returns CUDA_SUCCESS
  - All 318 existing tests still pass (those that explicitly set g_gpu_client are unaffected)
  - Mock-based tests still work (explicit g_gpu_client = &g_mock overrides default)
