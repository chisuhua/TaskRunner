schema: spec-driven
created: 2026-07-11
name: g-gpu-client-meyers-singleton-fallback
status: PROPOSED
scope: [test-fixture, umd-evolution]
supersedes: g-gpu-client-default-stub-init
goal: UMD shim functions (cuStreamSynchronize, cuGraphLaunch, cuMemPoolCreate) work when g_gpu_client is nullptr by falling back to a Meyers-singleton CudaStub. Does NOT mutate global g_gpu_client (preserves init_gpu_client() semantics for CLI path). Supersedes v1 (g-gpu-client-default-stub-init) which had a factually wrong baseline claiming CudaStub g_cuda_stub; existed.
follows:
  - umd-evolution-build-default-on
  - test-cu-graph-coverage-fixes
blocks:
  - l1-l2-bridge-e2e-test-skeleton
  - umd-evolution-acceptance-promotion-adr
baseline:
  g_gpu_client default value: nullptr (verified in src/test_fixture/gpu_driver_client.cpp:11)
  shim null guard: cuStreamSynchronize returns NOT_INITIALIZED when g_gpu_client == nullptr
  shim files using g_gpu_client: cu_stream.cpp:55, cu_graph.cpp:48, cu_mem_pool.cpp:42
  g_cuda_stub static instance: DOES NOT EXIST (verified via git log -S "CudaStub g_cuda_stub" -- returns only ac8129e spec commit; v1 baseline claim was factually wrong)
  init_gpu_client behavior: creates GpuDriverClient when g_gpu_client is null (cli_main.cpp:35)
  test setup pattern: TU-local static MockGpuDriver g_mock; + explicit g_gpu_client = &g_mock;
  Meyers singleton pattern: first-call construction, no init order issue, no global mutation
target:
  cuda_driver_accessor.hpp: new shared header with get_driver_or_default()
  shim fallback: 3 shim files use accessor instead of null guard
  NOT_INITIALIZED returns: removed (fallback guarantees driver non-null)
  new test: tests/umd/test_shim_default_init.cpp with 2-3 cases
  test guarantee: g_gpu_client global pointer is NEVER mutated by fallback
non_goals:
  - Creating a static CudaStub g_cuda_stub; instance (would break init_gpu_client() short-circuit)
  - Mutating global g_gpu_client pointer (would break CLI path)
  - Changing CudaStub::wait_fence semantics
  - Production build changes (test-fixture + umd-evolution scope only)
  - Removing g_mock-based test pattern (existing tests unchanged)
risk_level: low
cross_repo:
  - None (TaskRunner-only)
  - No UsrLinuxEmu submodule bump required
estimated_loc_change:
  new files: ~50 lines (cuda_driver_accessor.hpp + test_shim_default_init.cpp)
  modified files: ~15 lines across 3 shim files (5 lines each)
acceptance:
  - 318 existing tests still pass
  - 2-3 new fallback tests pass (test_shim_default_init)
  - CLI smoke test: init_gpu_client() still creates GpuDriverClient (not CudaStub)
  - tools/docs-audit.sh passes
  - g_gpu_client global pointer value is never mutated by fallback (T3 assertion)
  - 3 shim files all include cuda_driver_accessor.hpp (grep verified)
supersession_reason: |
  v1 (g-gpu-client-default-stub-init, 2026-07-09) had a factually wrong baseline
  claiming CudaStub g_cuda_stub; static instance existed in src/test_fixture/cuda_stub.cpp.
  Git archaeology (git log -S "CudaStub g_cuda_stub") confirms this instance NEVER existed
  in any commit. v1 also conflated 3 distinct CudaStub usage patterns (CLI g_runtime_stub,
  shim g_stub, test g_mock) as if they were a single global g_cuda_stub.

  v1 Risk #3 mitigation ("production build doesn't link test_fixture") was also wrong:
  umd-evolution default build mode DOES link cuda_stub.cpp via cu_init.cpp:14 include.
  Following v1 plan literally would cause init_gpu_client() to short-circuit
  (if (g_gpu_client) return 0;), silently degrading CLI commands to mock behavior.

  v2 supersedes v1 with Meyers-singleton fallback that preserves init_gpu_client()
  semantics and avoids cross-scope static init complications.
